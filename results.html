<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 2026 NTIC-KANO SRC Election Results - OFFICIAL</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .hero-banner {
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 4rem 2rem;
            border-radius: 20px;
            margin-bottom: 3rem;
            box-shadow: 0 10px 30px rgba(0, 51, 153, 0.2);
        }
        .hero-banner h1 { color: white; margin-bottom: 10px; font-size: 2.5rem; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            border: 2px solid #e2e8f0;
            text-align: center;
        }
        .stat-card h3 { color: #64748b; font-size: 0.9rem; text-transform: uppercase; margin-bottom: 5px; }
        .stat-card div { color: var(--primary); font-size: 2.5rem; font-weight: 800; }

        .position-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 2px solid #e2e8f0;
            text-align: left;
        }
        .position-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f1f5f9;
        }

        .candidate-row { margin-bottom: 20px; }
        .candidate-info { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: 600; color: #1e293b; }
        .progress-container {
            height: 12px;
            background: #f1f5f9;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: var(--primary);
            border-radius: 10px;
            transition: width 1s ease-in-out;
        }
        .winner-tag {
            background: #fef3c7;
            color: #92400e;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            margin-left: 10px;
        }

        .export-btn {
            background: #10b981;
            color: white;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: 700;
            margin-top: 20px;
            border: none;
            cursor: pointer;
        }
        #loading { padding: 50px; font-size: 1.2rem; color: var(--primary); font-weight: 600; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="hero-banner">
        <div style="font-weight: 700; opacity: 0.9; text-transform: uppercase; letter-spacing: 2px;">Official Report</div>
        <h1>SRC Election Results</h1>
        <p>Nigerian Turkish International Colleges - Kano</p>
        <button class="export-btn" onclick="downloadCSV()">Download Audit CSV</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>Total Ballots</h3>
            <div id="totalVotes">--</div>
        </div>
        <div class="stat-card">
            <h3>Status</h3>
            <div style="color: #10b981; font-size: 1.5rem;">Verified Live</div>
        </div>
    </div>

    <div id="loading">📊 Accessing Secure Database...</div>
    <div id="resultsContent"></div>
</div>

<script>
// YOUR SCRIPT URL INCLUDED
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxNxFMBm7hTPdO9BTmnx0QUB9BTneG9lnBcB6VundIrC0-zDINYnukwjw6XiV4eNmfT/exec";

async function loadRealResults() {
    try {
        const response = await fetch(SCRIPT_URL);
        const data = await response.json();
        
        document.getElementById('loading').style.display = 'none';
        document.getElementById('totalVotes').innerText = data.length;

        const resultsByPosition = {};

        data.forEach(vote => {
            try {
                // Handle both object and stringified JSON
                const selections = typeof vote.selections === 'string' ? JSON.parse(vote.selections) : vote.selections;
                Object.entries(selections).forEach(([pos, candidate]) => {
                    if (!resultsByPosition[pos]) resultsByPosition[pos] = {};
                    resultsByPosition[pos][candidate] = (resultsByPosition[pos][candidate] || 0) + 1;
                });
            } catch(e) { console.error("Error parsing vote", e); }
        });

        renderCharts(resultsByPosition);
    } catch (error) {
        document.getElementById('loading').innerHTML = "❌ Failed to connect to server.<br><small>Ensure your Google Script has Web App permissions set to 'Anyone'.</small>";
    }
}

function renderCharts(resultsByPosition) {
    const container = document.getElementById('resultsContent');
    container.innerHTML = '';

    Object.entries(resultsByPosition).forEach(([position, candidates]) => {
        const total = Object.values(candidates).reduce((a, b) => a + b, 0);
        const sortedCandidates = Object.entries(candidates).sort((a, b) => b[1] - a[1]);
        const leadingCandidate = sortedCandidates[0][0];

        let sectionHtml = `
            <div class="position-section">
                <div class="position-title">${position}</div>
        `;

        sortedCandidates.forEach(([name, votes]) => {
            const percent = ((votes / total) * 100).toFixed(1);
            const isLeading = name === leadingCandidate;
            
            sectionHtml += `
                <div class="candidate-row">
                    <div class="candidate-info">
                        <span>${name} ${isLeading ? '<span class="winner-tag">LEADING</span>' : ''}</span>
                        <span>${votes} votes (${percent}%)</span>
                    </div>
                    <div class="progress-container">
                        <div class="progress-bar" style="width: ${percent}%"></div>
                    </div>
                </div>
            `;
        });

        sectionHtml += `</div>`;
        container.innerHTML += sectionHtml;
    });
}

function downloadCSV() {
    fetch(SCRIPT_URL)
        .then(res => res.json())
        .then(data => {
            let csv = 'Timestamp,Voter ID,Position,Candidate\n';
            data.forEach(row => {
                const selections = typeof row.selections === 'string' ? JSON.parse(row.selections) : row.selections;
                Object.entries(selections).forEach(([p, c]) => {
                    csv += `"${row.timestamp}","${row.voter}","${p}","${c}"\n`;
                });
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'NTIC_Election_Audit.csv';
            a.click();
        });
}

window.onload = loadRealResults;
</script>
</body>
</html>
